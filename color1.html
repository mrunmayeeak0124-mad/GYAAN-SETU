<!DOCTYPE html>
<html>
<head>
<title>Easy Fun</title>

<style>

body{
font-family:Arial;
background:#fff8dc;
text-align:center;
}

h1{
color:#ff1493;
}

.palette{
margin:20px;
}

.color{
width:40px;
height:40px;
border-radius:50%;
display:inline-block;
cursor:pointer;
margin:5px;
border:2px solid black;
}

.shape{
width:180px;
height:180px;
background:white;
border:5px solid black;
display:inline-block;
margin:20px;
cursor:pointer;
}

#msg{
font-size:25px;
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🎨 Easy Colouring Zone</h1>

<div class="palette">

<div class="color" style="background:red" onclick="setColor('red')"></div>
<div class="color" style="background:blue" onclick="setColor('blue')"></div>
<div class="color" style="background:green" onclick="setColor('green')"></div>
<div class="color" style="background:yellow" onclick="setColor('yellow')"></div>
<div class="color" style="background:pink" onclick="setColor('pink')"></div>
<div class="color" style="background:orange" onclick="setColor('orange')"></div>

</div>

<div class="shape" onclick="fill(this)">🌞</div>
<div class="shape" onclick="fill(this)">🦋</div>
<div class="shape" onclick="fill(this)">🍎</div>
<div class="shape" onclick="fill(this)">🎈</div>

<p id="msg"></p>

<script>

let selected="red";
let count=0;

function setColor(c){
selected=c;
}

function fill(box){
box.style.background=selected;
count++;

if(count>=4){
document.getElementById("msg").innerHTML=
"🎉 Wow! Excellent Colouring!";
}
}

</script>
<a href="color.html" class="btn">🏠 Back to Home</a>
</body>
</html>
