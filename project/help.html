<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help - Gyaan Setu</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Baloo 2', cursive;
    background:linear-gradient(135deg,#E8F5E9,#E1F5FE);
    min-height:100vh;
    padding:40px;
}

.help-box{
    max-width:800px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:35px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#4CAF50;
    font-size:50px;
    margin-bottom:30px;
}

.faq{
    margin-bottom:25px;
}

.question{
    font-size:24px;
    color:#333;
    margin-bottom:8px;
}

.answer{
    font-size:18px;
    color:#666;
}

.home-btn{
    display:block;
    width:max-content;
    margin:30px auto 0;
    text-decoration:none;
    background:#42A5F5;
    color:white;
    padding:12px 25px;
    border-radius:40px;
}

</style>
</head>

<body>

<div class="help-box">

    <h1>Help Center 💡</h1>

    <div class="faq">
        <div class="question">
            ❓ How do I start learning?
        </div>

        <div class="answer">
            Select any topic from the home page and begin your fun activities.
        </div>
    </div>

    <div class="faq">
        <div class="question">
            ❓ How are stars earned?
        </div>

        <div class="answer">
            You earn stars by completing quizzes and lessons correctly.
        </div>
    </div>

    <div class="faq">
        <div class="question">
            ❓ Can I track my progress?
        </div>

        <div class="answer">
            Yes! Visit the Progress page from the sidebar anytime.
        </div>
    </div>

    <a href="home.html" class="home-btn">
        ⬅ Back Home
    </a>

</div>

</body>
</html>
