<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colouring Zone</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Lilita+One&display=swap');

body{
margin:0;
font-family: 'Baloo 2', 'Segoe UI', sans-serif;
background:linear-gradient(to right,#ffd6e7,#d6f0ff);
overflow-x:hidden;
}

header{
text-align:center;
padding:20px;
background:#ff66a3;
color:white;
font-size:38px;
font-family: 'Lilita One', cursive;
letter-spacing: 1px;
animation:bounce 2s infinite;
box-shadow: 0 4px 15px rgba(255, 102, 163, 0.3);
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}

.welcome{
text-align:center;
font-size:28px;
margin-top:20px;
color:#ff1493;
font-weight: 800;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:0.6;}
to{opacity:1;}
}

.menu{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin:40px auto;
max-width: 1000px;
padding: 0 15px;
}

/* UI Card Clickable Parent Wrappers Framework Settings */
.menu a {
text-decoration:none;
display: block;
transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.card{
width:220px;
height:180px; /* Adjusted height bounds cleanly for kid emoji grids */
background:white;
border-radius:25px;
box-shadow: 0 8px 16px rgba(0,0,0,0.08);
text-align:center;
padding: 25px 15px;
font-size:22px;
font-weight: 800;
color: #4E342E; /* Professional Brand Brown Text Color Line */
border: 3px solid transparent;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 8px;
transition: all 0.3s ease;
}

/* Smooth Interactive Click Hover State Animations */
.menu a:hover {
transform: translateY(-8px) scale(1.05);
}

.menu a:hover .card {
background:#fff0f5;
border-color: #ff66a3;
box-shadow: 0 12px 24px rgba(255, 102, 163, 0.2);
}

.card-emoji {
font-size: 3.2rem;
display: block;
animation: bobIcon 3s ease-in-out infinite alternate;
}

@keyframes bobIcon {
from { transform: translateY(0); }
to { transform: translateY(-6px); }
}

footer{
margin-top:40px;
background:#ff66a3;
color:white;
text-align:center;
padding:18px;
font-size: 1.1rem;
font-weight: bold;
}

.stars{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index: 0;
}

.star{
position:absolute;
color:white;
animation:float 6s linear infinite;
font-size:20px;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-10vh);
opacity:1;
}
}
</style>
</head>

<body>

<div class="stars">

<div class="star" style="left:30%">⭐</div>

<div class="star" style="left:70%">⭐</div>
<div class="star" style="left:90%">✨</div>
</div>

<header>
