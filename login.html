<!DOCTYPE html>
<html>
<head>
    <title>Login - Gyaan Setu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-image: url("images/6.jpg");
            background-size: cover;
            background-position: center;
        }

        h1 {
            color: black;
            font-size: 50px;
            margin-top: 40px;
            text-shadow: 2px 2px 10px black;
        }
        .login-box {
            background: rgba(255,255,255,0.9);
            width: 300px;
            margin: 60px auto;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: #6ec6ff;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #2196f3;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: blue;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-120vh); }
        }

        .b1 { left: 20%; animation-duration: 8s; }
        .b2 { left: 50%; animation-duration: 12s; }
        .b3 { left: 80%; animation-duration: 10s; }

    </style>
</head>

<body>

    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>

    <h1>Login 🔐</h1>

    <div class="login-box">
        <input type="text" placeholder="Enter your name">

        <input type="password" placeholder="Enter password">

        <button>Login</button>
        
        <a href="signup.html">New user? Sign Up</a>
        <a href="index.html">⬅ Back to Home</a>
    </div>

</body>
</html>
