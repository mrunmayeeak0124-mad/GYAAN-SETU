<!DOCTYPE html>
<html>
<head>
<title>Challenge Art Game</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(135deg,#f3e5ff,#d0f0ff);
}

/* HEADER */
h1{
    margin:15px;
    color:#6a00f4;
    font-size:40px;
}

h3{
    color:#333;
}

/* TOOLBAR */
.toolbar{
    margin:15px;
}

button{
    padding:10px 18px;
    margin:6px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* COLOR BUTTONS */
.color-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:3px solid white;
}

/* CANVAS */
canvas{
    border:6px solid #333;
    background:white;
    border-radius:20px;
    cursor:crosshair;
}

/* STATUS */
#status{
    font-size:20px;
    margin-top:10px;
    font-weight:bold;
    color:#ff1493;
}
</style>
</head>

<body>

<h1>🚀 Challenge Art Game</h1>
<h3 id="levelText">Level 1 - Draw Free Style ✏️</h3>

<!-- COLORS -->
<div class="toolbar">
    <button class="color-btn" style="background:red" onclick="color='red'"></button>
    <button class="color-btn" style="background:blue" onclick="color='blue'"></button>
    <button class="color-btn" style="background:green" onclick="color='green'"></button>
    <button class="color-btn" style="background:yellow" onclick="color='yellow'"></button>
    <button class="color-btn" style="background:black" onclick="color='black'"></button>
</div>

<!-- ACTION BUTTONS -->
<div class="toolbar">
    <button onclick="clearCanvas()">🧹 Clear</button>
    <button onclick="nextLevel()">🚀 Next Level</button>
</div>

<canvas id="paint" width="600" height="400"></canvas>

<h2 id="status">Start drawing something creative 🎨</h2>

<script>

const canvas = document.getElementById("paint");
const ctx = canvas.getContext("2d");

let color = "red";
let drawing = false;
let level = 1;

/* START DRAWING */
canvas.addEventListener("mousedown", ()=> drawing = true);
canvas.addEventListener("mouseup", ()=> drawing = false);
canvas.addEventListener("mouseleave", ()=> drawing = false);

canvas.addEventListener("mousemove", draw);

/* DRAW FUNCTION (FREE HAND) */
function draw(e){
    if(!drawing) return;

    ctx.fillStyle = color;

    ctx.beginPath();
    ctx.arc(e.offsetX, e.offsetY, 6 + level*2, 0, Math.PI*2);
    ctx.fill();

    document.getElementById("status").innerText =
    "🎨 Keep going! You're creating art...";
}

/* CLEAR CANVAS */
function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    document.getElementById("status").innerText =
    "🧹 Canvas cleared! Start again ✨";
}

/* NEXT LEVEL */
function nextLevel(){

    level++;

    if(level === 2){
        document.getElementById("levelText").innerText =
        "Level 2 - Draw Shapes (Try patterns!) ⭐";
    }

    else if(level === 3){
        document.getElementById("levelText").innerText =
        "Level 3 - Speed Art Challenge 🚀 (Thicker Brush!)";
    }

    else{
        document.getElementById("levelText").innerText =
        "🎉 Max Level Reached! You are an Art Master 🏆";
        level = 3;
    }

    document.getElementById("status").innerText =
    "🔥 New challenge unlocked!";
}

</script>
<a href="color.html" class="btn">🏠 Back to Home</a>
</body>
</html>
