<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Zone – Magical Vector Coloring Book</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Lilita+One&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Baloo 2', sans-serif;
  background: linear-gradient(160deg, #e6f7ff, #ceeefd);
  min-height: 100vh;
  text-align: center;
  padding: 25px;
}

/* HEADER */
.creative-banner {
  font-family: 'Lilita One', cursive;
  font-size: 2.2rem;
  color: white;
  background: linear-gradient(90deg,#FF1493,#FF66A3,#00BBF9);
  padding: 10px 30px;
  border-radius: 40px;
  display: inline-block;
  margin-bottom: 10px;
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* COLORS */
.palette {
  display: grid;
  grid-template-columns: repeat(2, 55px);
  gap: 10px;
  background: white;
  padding: 15px;
  border-radius: 20px;
}

.color {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid white;
}

.color:hover {
  transform: scale(1.1);
}

/* SVG BOX */
.canvas-box {
  width: 350px;
  height: 350px;
  background: white;
  border: 4px dashed #FF66A3;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SVG PARTS */
.part {
  fill: white;
  stroke: black;
  stroke-width: 3;
  cursor: pointer;
  transition: 0.3s;
}

.part:hover {
  opacity: 0.8;
}

/* BUTTONS */
.buttons {
  margin-top: 15px;
}

button {
  padding: 12px 25px;
  margin: 5px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
}

.back {
  background: #333;
  color: white;
}

.finish {
  background: #ff1493;
  color: white;
  opacity: 0.4;
  pointer-events: none;
}

.finish.active {
  opacity: 1;
  pointer-events: auto;
  animation: pulse 1.2s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

/* TEXT */
.msg {
  margin-top: 15px;
  font-size: 20px;
  font-weight: bold;
  color: #2e7d32;
}

/* CONFETTI */
.confetti {
  position: fixed;
  font-size: 25px;
  animation: fall 2s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="creative-banner">🌈 Magical Creative Zone</div>

<div class="container">

<!-- COLOR PALETTE -->
<div class="palette">
  <div class="color" style="background:red" onclick="setColor('red',this)"></div>
  <div class="color" style="background:blue" onclick="setColor('blue',this)"></div>
  <div class="color" style="background:green" onclick="setColor('green',this)"></div>
  <div class="color" style="background:yellow" onclick="setColor('yellow',this)"></div>
</div>

<!-- DRAW AREA -->
<div>
  <div class="canvas-box" id="box">
    <svg width="300" height="300" viewBox="0 0 100 100">
      <circle class="part" cx="50" cy="50" r="30"></circle>
      <rect class="part" x="20" y="20" width="30" height="30"></rect>
      <polygon class="part" points="60,60 80,40 90,80"></polygon>
    </svg>
  </div>

  <div class="buttons">
    <button class="back" onclick="location.href='index.html'">🏠 Home</button>
    <button class="finish" id="finishBtn" onclick="finish()">✨ Finish</button>
  </div>

  <div class="msg" id="msg">Start coloring 🎨</div>
</div>

</div>

<script>

let color = "red";

function setColor(c, el){
  color = c;
}

/* COLOR FILL */
document.querySelectorAll(".part").forEach(p => {
  p.addEventListener("click", function(){
    this.style.fill = color;
    check();
  });
});

/* CHECK COMPLETION */
function check(){
  let parts = document.querySelectorAll(".part");
  let filled = 0;

  parts.forEach(p => {
    if(p.style.fill && p.style.fill !== "white"){
      filled++;
    }
  });

  if(filled === parts.length){
    document.getElementById("msg").innerText =
    "🎉 Amazing! You completed the artwork!";

    document.getElementById("finishBtn").classList.add("active");
  }
}

/* FINISH BUTTON */
function finish(){

  let btn = document.getElementById("finishBtn");

  if(!btn.classList.contains("active")){
    document.getElementById("msg").innerText =
    "⚠️ Complete coloring first!";
    return;
  }

  document.getElementById("msg").innerText =
  "🏆 Super Artist! Well Done!";

  launchConfetti();
}

/* CONFETTI */
function launchConfetti(){
  for(let i=0;i<30;i++){
    let d = document.createElement("div");
    d.className = "confetti";
    d.innerHTML = "🎉";
    d.style.left = Math.random()*100 + "vw";
    d.style.top = "-20px";
    d.style.position = "fixed";
    document.body.appendChild(d);

    setTimeout(()=>d.remove(),2000);
  }
}

</script>
<a href="color.html" class="btn">🏠 Back to Home</a>
</body>
</html>
