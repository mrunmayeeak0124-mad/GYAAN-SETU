<!DOCTYPE html>
<html>
<head>
<title>Achievements</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#e6ffe6,#e6f3ff);
text-align:center;
padding:40px;
}

/* TITLE */
h1{
font-size:36px;
color:#ff4081;
margin-bottom:30px;
animation:pop 1.5s infinite alternate;
}

@keyframes pop{
from{transform:scale(1); opacity:0.8;}
to{transform:scale(1.05); opacity:1;}
}

/* CONTAINER */
.box{
background:white;
padding:30px;
border-radius:25px;
display:inline-block;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
max-width:500px;
width:90%;
}

/* ACHIEVEMENT CARDS */
.achieve{
background:linear-gradient(135deg,#fff,#fdf2ff);
margin:15px 0;
padding:20px;
border-radius:18px;
font-size:22px;
font-weight:bold;
color:#333;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
transition:0.3s;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding: black;
border: black;
}

.achieve:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#ffe6f0,#e6f7ff);
border: black;
}

/* ICON */
.icon{
font-size:30px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* FOOTER TEXT STYLE */
.note{
margin-top:20px;
font-size:16px;
color:#666;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🏆 Student Achievements</h1>

<div class="box">

<div class="achieve">
<span class="icon">⭐</span>
Colour Star
</div>

<div class="achieve">
<span class="icon">🌈</span>
Creative Genius
</div>

<div class="achieve">
<span class="icon">🎨</span>
Art Champion
</div>

</div>

<p class="note">Keep learning to unlock more achievements 🚀</p>

<a href="home.html" class="btn">🏠 Back to Home</a>

</body>
</html>
