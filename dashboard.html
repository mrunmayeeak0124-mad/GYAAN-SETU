<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Gyaan Setu</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Baloo 2', cursive;
    background:linear-gradient(135deg,#E0F7FA,#FFF3E0);
    min-height:100vh;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.title{
    font-size:45px;
    color:#FF4081;
}

.home-btn{
    text-decoration:none;
    background:#42A5F5;
    color:white;
    padding:12px 25px;
    border-radius:40px;
    font-size:18px;
}

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    padding:30px;
    border-radius:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card h2{
    margin:15px 0;
    color:#333;
}

.card p{
    color:#666;
}

.emoji{
    font-size:60px;
}

</style>
</head>

<body>

<div class="topbar">

    <div class="title">
        My Dashboard 🌟
    </div>

    <a href="home.html" class="home-btn">
        ⬅ Back Home
    </a>

</div>

<div class="card-container">

    <div class="card">
        <div class="emoji">📚</div>
        <h2>Lessons Completed</h2>
        <p>12 Fun Lessons Finished!</p>
    </div>

    <div class="card">
        <div class="emoji">⭐</div>
        <h2>Total Stars</h2>
        <p>58 Learning Stars Earned!</p>
    </div>

    <div class="card">
        <div class="emoji">🏆</div>
        <h2>Achievements</h2>
        <p>Math Wizard Badge Unlocked!</p>
    </div>

    <div class="card">
        <div class="emoji">🎯</div>
        <h2>Today's Goal</h2>
        <p>Complete 2 Activities</p>
    </div>

</div>

</body>
</html>
